spring.application.name=f1-historical-backend

# Puerto de ejecución del Backend
server.port=8082

# ── Configuración PostgreSQL 
spring.datasource.url=jdbc:postgresql://localhost:5432/f1_historical_db
spring.datasource.username=postgres
spring.datasource.password=hector
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Configuración Hibernate / JPA 
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
