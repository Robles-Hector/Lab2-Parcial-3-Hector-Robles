# Nombre de la Aplicación
spring.application.name=f1-historical-backend

# Puerto de ejecución del Backend (Si no encuentra la variable, usa 8082)
server.port=${SERVER_PORT:8082}

# Configuración de la Fuente de Datos (PostgreSQL Técnico con respaldos)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/f1_historical_db}
spring.datasource.username=${DB_USERNAME:f1_app}
spring.datasource.password=${DB_PASSWORD:EspeF1_2026.*}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Rendimiento del Pool (HikariCP)
spring.datasource.hikari.pool-name=F1_Historical_HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=2000

# Parámetros del ORM Hibernate / JPA 
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Credenciales de Semilla Administrativa
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}